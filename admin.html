<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WillyGuru Admin Review</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<main>
  <header class="hero">
    <div class="brand">WILLYGURU</div>
    <h1>Submission Review</h1>
    <p>Private moderator page. Review the original screenshot beside the predicted and confirmed colours, then approve or reject it.</p>
  </header>

  <section id="loginCard" class="card loginCard">
    <h2>Admin sign in</h2>
    <label>Email<input id="email" type="email" autocomplete="username"></label>
    <label>Password<input id="password" type="password" autocomplete="current-password"></label>
    <button id="signIn" class="primary">Sign in</button>
    <div id="loginMessage" class="message"></div>
  </section>

  <section id="app" hidden>
    <div class="toolbar card">
      <div>
        <strong id="adminEmail"></strong>
        <div class="muted" id="summary">Loading…</div>
      </div>
      <div class="actions">
        <select id="statusFilter">
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="all">All</option>
        </select>
        <button id="refresh">Refresh</button>
        <button id="signOut">Sign out</button>
      </div>
    </div>
    <div id="globalMessage" class="message"></div>
    <div id="submissions" class="submissionGrid"></div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>
</body>
</html>
